steps:
  # Step 1: Install Dependencies & Run Tests
  - name: 'node:20'
    entrypoint: npm
    args: ['install']
  
  - name: 'node:20'
    entrypoint: npm
    args: ['test']

  # Step 2: Build the Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/syncspace-soc', '.']

  # Step 3: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/syncspace-soc']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'syncspace-soc'
      - '--image'
      - 'gcr.io/$PROJECT_ID/syncspace-soc'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/syncspace-soc'
